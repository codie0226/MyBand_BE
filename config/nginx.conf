# WebSocket 연결 여부에 따라 Connection 헤더 자동 전환
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream backend {
    server app:3000;
}

# ── HTTP (80) ─────────────────────────────────────────────────────────────────
# SSL 인증서 준비 후:
#   1. 아래 location 블록을 주석 처리
#   2. return 301 줄 주석 해제
#   3. 아래 HTTPS 서버 블록 전체 주석 해제
server {
    listen 80;
    server_name pagomnini.kro.kr;

    # [SSL 준비 후] HTTP → HTTPS 리다이렉트
    # return 301 https://$host$request_uri;

    # [SSL 준비 전] HTTP에서 직접 프록시
    location / {
        proxy_pass          http://backend;
        proxy_http_version  1.1;

        proxy_set_header    Host                $host;
        proxy_set_header    X-Real-IP           $remote_addr;
        proxy_set_header    X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto   $scheme;

        # WebSocket 핸드셰이크 헤더
        proxy_set_header    Upgrade             $http_upgrade;
        proxy_set_header    Connection          $connection_upgrade;

        # WebSocket 유지 시간 (기본 60s → 1시간으로 연장)
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;

        # 버퍼링 비활성화 (실시간 스트리밍/WS에 유리)
        proxy_buffering     off;
    }
}

